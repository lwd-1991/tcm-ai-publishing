<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的网站</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
    }
    .visit-counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 14px;
      color: #555;
      margin-top: 30px;
    }
    .visit-counter .icon {
      font-size: 18px;
    }
    .visit-counter .number {
      font-weight: 600;
      color: #222;
      min-width: 30px;
    }
  </style>
</head>
<body>
  <h1>欢迎来到我的网站</h1>
  <p>这是一个 GitHub Pages 静态网站</p>
  
  <div class="visit-counter">
    <span class="icon">👁</span>
    <span>访问量：</span>
    <span class="number" id="visit-count">加载中...</span>
  </div>

  <script>
    // 读取 count.txt 并显示
    fetch('count.txt?' + Date.now())
      .then(r => r.text())
      .then(n => {
        document.getElementById('visit-count').textContent = 
          parseInt(n.trim()).toLocaleString() || '0';
      })
      .catch(() => {
        document.getElementById('visit-count').textContent = '-';
      });
  </script>
</body>
</html>
