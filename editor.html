<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT 编辑器 - 中医古籍</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #8B4513;
            --primary-dark: #654321;
            --bg-paper: #FDF5E6;
            --bg-dark: #2C1810;
            --text-main: #3D2914;
            --text-light: #8B7355;
            --border: #D4A574;
            --accent: #C41E3A;
            --success: #2E7D32;
        }

        body {
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif;
            background: linear-gradient(135deg, #FDF5E6 0%, #F5E6D3 100%);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--bg-dark) 0%, #3D2914 100%);
            color: #FDF5E6;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            color: #C4A77D;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9rem;
            transition: color .3s;
        }
        .back-link:hover { color: #FDF5E6; }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Font size in header */
        .font-size-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,.08);
            padding: 6px 12px;
            border-radius: 8px;
        }
        .font-size-group label { font-size: .8rem; color: #C4A77D; }
        .font-size-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(196,167,125,.4);
            border-radius: 2px;
            cursor: pointer;
        }
        .font-size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: #C4A77D;
            border-radius: 50%;
            cursor: pointer;
        }
        .font-size-value { color: #FDF5E6; font-weight: 600; min-width: 32px; text-align: center; font-size: .85rem; }

        /* Toolbar */
        .toolbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: .85rem;
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all .25s;
            white-space: nowrap;
        }
        .btn:hover { background: var(--bg-paper); border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
        .btn-success:hover { background: #1B5E20; }
        .btn:disabled { opacity: .4; cursor: not-allowed; }

        .file-info {
            margin-left: 12px;
            padding-left: 12px;
            border-left: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .85rem;
            color: var(--text-light);
        }
        .file-name { font-weight: 600; color: var(--text-main); }
        .file-status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: .78rem;
        }
        .file-status.saved { background: #E8F5E9; color: var(--success); }
        .file-status.modified { background: #FFF3E0; color: #E65100; }

        /* Editor area */
        .editor-wrapper {
            position: relative;
            height: calc(100vh - 115px);
        }

        /* Welcome screen */
        .welcome {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #FDF5E6 0%, #F5E6D3 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 5;
        }
        .welcome.hidden { display: none; }
        .welcome-icon { font-size: 4rem; opacity: .25; }
        .welcome h2 { font-size: 1.6rem; color: var(--text-main); }
        .welcome p { color: var(--text-light); max-width: 380px; text-align: center; line-height: 1.8; font-size: .95rem; }
        .welcome-buttons { display: flex; gap: 12px; margin-top: 8px; }

        /* Textarea */
        #editorArea {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            resize: none;
            padding: 32px 40px;
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', 'Source Han Serif SC', serif;
            font-size: 16px;
            line-height: 2;
            color: var(--text-main);
            background: var(--bg-paper);
            tab-size: 4;
            display: none;
        }
        #editorArea:focus { background: #FFFCF5; }

        /* Status bar */
        .status-bar {
            background: var(--bg-dark);
            color: #C4A77D;
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .82rem;
        }
        .status-left, .status-right { display: flex; gap: 20px; align-items: center; }
        .status-item { display: flex; align-items: center; gap: 4px; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 50px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 8px;
            color: #fff;
            font-size: .85rem;
            opacity: 0;
            transform: translateY(16px);
            transition: all .3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--accent); }
        .toast.info { background: var(--primary); }

        /* Hidden input */
        #fileInput { display: none; }

        @media (max-width: 768px) {
            .header { padding: 12px 14px; flex-direction: column; align-items: flex-start; }
            .header h1 { font-size: 1.1rem; }
            .header-controls { width: 100%; justify-content: space-between; }
            .font-size-group { padding: 4px 10px; }
            .font-size-slider { width: 60px; }
            .toolbar { padding: 8px 10px; gap: 4px; }
            .btn { padding: 5px 10px; font-size: .8rem; }
            .file-info { margin-left: 6px; padding-left: 6px; }
            #editorArea { padding: 20px 16px; font-size: 15px; }
            .editor-wrapper { height: calc(100vh - 140px); }
            .status-bar { flex-direction: column; gap: 4px; padding: 6px 10px; }
            .status-left { flex-wrap: wrap; gap: 10px; }
        }

        @media (max-width: 480px) {
            #editorArea { padding: 16px 12px; font-size: 14px; line-height: 1.8; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回典藏
            </a>
            <h1>TXT 编辑器</h1>
        </div>
        <div class="header-controls">
            <div class="font-size-group">
                <label>字号</label>
                <input type="range" class="font-size-slider" id="fontSizeSlider" min="12" max="28" value="16" step="1">
                <span class="font-size-value" id="fontSizeValue">16</span>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <button class="btn btn-primary" onclick="openFile()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            打开
        </button>
        <button class="btn btn-success" onclick="saveFile()" id="saveBtn" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
            保存
        </button>
        <button class="btn" onclick="saveAsFile()" id="saveAsBtn" disabled>
            另存为
        </button>
        <button class="btn" onclick="newFile()">新建</button>
        <div class="file-info" id="fileInfoGroup" style="display:none;">
            <span class="file-name" id="currentFileName">未命名</span>
            <span class="file-status saved" id="fileStatus">已保存</span>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".txt,.md,.json,.js,.html,.css,.xml,.csv" onchange="handleFileSelect(event)">

    <div class="editor-wrapper">
        <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">📜</div>
            <h2>TXT 文本编辑器</h2>
            <p>专为中医古籍设计的纯文本编辑器<br>支持打开、编辑和保存 .txt 文件</p>
            <div class="welcome-buttons">
                <button class="btn btn-primary" onclick="openFile()">打开本地文件</button>
                <button class="btn" onclick="newFile()">新建空白文档</button>
            </div>
        </div>
        <textarea id="editorArea" spellcheck="false" wrap="off"></textarea>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <span class="status-item">编码: <span id="encodingDisplay">UTF-8</span></span>
            <span class="status-item">行: <span id="lineCount">0</span></span>
            <span class="status-item">字: <span id="charCount">0</span></span>
        </div>
        <div class="status-right">
            <span id="cursorPosition">行 1, 列 1</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // === State ===
        let currentFile = null
        let currentFileHandle = null
        let isModified = false
        let originalContent = ''

        const editor = document.getElementById('editorArea')
        const welcome = document.getElementById('welcomeScreen')

        // === Font size ===
        const fontSizeSlider = document.getElementById('fontSizeSlider')
        const fontSizeValue = document.getElementById('fontSizeValue')

        function loadFontSize() {
            const saved = parseInt(localStorage.getItem('tcm_editor_font_size') || '16')
            fontSizeSlider.value = saved
            fontSizeValue.textContent = saved
            editor.style.fontSize = saved + 'px'
        }

        fontSizeSlider.addEventListener('input', () => {
            const v = parseInt(fontSizeSlider.value)
            fontSizeValue.textContent = v
            editor.style.fontSize = v + 'px'
            localStorage.setItem('tcm_editor_font_size', v)
        })

        loadFontSize()

        // === Toast ===
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast')
            t.textContent = msg
            t.className = 'toast ' + type + ' show'
            clearTimeout(t._hide)
            t._hide = setTimeout(() => t.classList.remove('show'), 2500)
        }

        // === Editor events ===
        editor.addEventListener('input', () => {
            if (!isModified && currentFile) {
                isModified = true
                updateFileStatus()
            }
            updateStats()
        })

        editor.addEventListener('keyup', updateCursor)
        editor.addEventListener('click', updateCursor)

        function updateStats() {
            const text = editor.value
            document.getElementById('lineCount').textContent = text ? text.split('\n').length : 0
            document.getElementById('charCount').textContent = text.length
        }

        function updateCursor() {
            const text = editor.value
            const pos = editor.selectionStart
            const before = text.substring(0, pos)
            const line = before.split('\n').length
            const col = pos - before.lastIndexOf('\n')
            document.getElementById('cursorPosition').textContent = `行 ${line}, 列 ${col}`
        }

        // === File operations ===
        function openFile() {
            document.getElementById('fileInput').click()
        }

        async function handleFileSelect(e) {
            const file = e.target.files[0]
            if (!file) return
            try {
                const content = await file.text()
                currentFile = file
                currentFileHandle = null
                originalContent = content
                isModified = false
                editor.value = content
                showEditor()
                updateFileInfo(file.name)
                updateFileStatus()
                updateStats()
                updateCursor()
                showToast('已打开: ' + file.name, 'success')
            } catch (err) {
                showToast('打开失败: ' + err.message, 'error')
            }
            e.target.value = ''
        }

        function showEditor() {
            welcome.classList.add('hidden')
            editor.style.display = 'block'
            document.getElementById('fileInfoGroup').style.display = 'flex'
            document.getElementById('saveBtn').disabled = false
            document.getElementById('saveAsBtn').disabled = false
            editor.focus()
        }

        function updateFileInfo(name) {
            document.getElementById('currentFileName').textContent = name
        }

        function updateFileStatus() {
            const el = document.getElementById('fileStatus')
            if (isModified) {
                el.textContent = '未保存'
                el.className = 'file-status modified'
            } else {
                el.textContent = '已保存'
                el.className = 'file-status saved'
            }
        }

        async function saveFile() {
            const text = editor.value
            if (currentFileHandle) {
                try {
                    const w = await currentFileHandle.createWritable()
                    await w.write(text)
                    await w.close()
                    originalContent = text
                    isModified = false
                    updateFileStatus()
                    showToast('已保存', 'success')
                } catch (err) {
                    showToast('保存失败: ' + err.message, 'error')
                }
            } else if (currentFile) {
                downloadFile(text, currentFile.name)
                originalContent = text
                isModified = false
                updateFileStatus()
                showToast('已下载保存', 'success')
            } else {
                saveAsFile()
            }
        }

        async function saveAsFile() {
            const text = editor.value
            const name = currentFile ? currentFile.name : '未命名.txt'
            if ('showSaveFilePicker' in window) {
                try {
                    const h = await window.showSaveFilePicker({
                        suggestedName: name,
                        types: [{ description: '文本文件', accept: { 'text/plain': ['.txt'] } }]
                    })
                    const w = await h.createWritable()
                    await w.write(text)
                    await w.close()
                    currentFileHandle = h
                    currentFile = { name: h.name }
                    originalContent = text
                    isModified = false
                    updateFileInfo(h.name)
                    updateFileStatus()
                    showToast('已保存', 'success')
                } catch (err) {
                    if (err.name !== 'AbortError') showToast('保存失败: ' + err.message, 'error')
                }
            } else {
                downloadFile(text, name)
                showToast('已下载保存', 'success')
            }
        }

        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' })
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url; a.download = filename
            document.body.appendChild(a); a.click()
            document.body.removeChild(a)
            URL.revokeObjectURL(url)
        }

        function newFile() {
            if (isModified && !confirm('有未保存的更改，确定新建？')) return
            editor.value = ''
            currentFile = null
            currentFileHandle = null
            originalContent = ''
            isModified = false
            showEditor()
            updateFileInfo('未命名.txt')
            updateFileStatus()
            updateStats()
            updateCursor()
            showToast('已新建文档', 'info')
        }

        // === Keyboard shortcuts ===
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile() }
            if ((e.ctrlKey || e.metaKey) && e.key === 'o') { e.preventDefault(); openFile() }
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); newFile() }
        })

        // Warn before leaving
        window.addEventListener('beforeunload', e => {
            if (isModified) { e.preventDefault(); e.returnValue = '' }
        })
    </script>
</body>
</html>
