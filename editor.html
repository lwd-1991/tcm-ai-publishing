<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医古籍 TXT 编辑器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Monaco Editor -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B4513;
            --primary-dark: #654321;
            --bg-paper: #FDF5E6;
            --bg-dark: #2C1810;
            --text-main: #3D2914;
            --text-light: #8B7355;
            --border: #D4A574;
            --accent: #C41E3A;
            --success: #2E7D32;
        }

        body {
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif;
            background: linear-gradient(135deg, #FDF5E6 0%, #F5E6D3 100%);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--bg-dark) 0%, #3D2914 100%);
            color: #FDF5E6;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header .subtitle {
            font-size: 0.85rem;
            color: #C4A77D;
        }

        .back-link {
            color: #C4A77D;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #FDF5E6;
        }

        /* Toolbar */
        .toolbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
            padding-right: 15px;
            border-right: 1px solid var(--border);
        }

        .toolbar-group:last-child {
            border-right: none;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--bg-paper);
            border-color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .btn-success:hover {
            background: #1B5E20;
        }

        .btn-warning {
            background: #F57C00;
            color: white;
            border-color: #F57C00;
        }

        .btn-warning:hover {
            background: #E65100;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .file-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .file-status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .file-status.modified {
            background: #FFF3E0;
            color: #E65100;
        }

        .file-status.saved {
            background: #E8F5E9;
            color: var(--success);
        }

        /* Editor Container */
        .editor-container {
            height: calc(100vh - 140px);
            position: relative;
        }

        #editor {
            width: 100%;
            height: 100%;
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }

        /* Status Bar */
        .status-bar {
            background: var(--bg-dark);
            color: #C4A77D;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .status-left {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Font Size Control */
        .font-size-control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 20px;
            border-left: 1px solid rgba(196, 167, 125, 0.3);
        }

        .font-size-label {
            font-size: 0.85rem;
            color: #C4A77D;
            white-space: nowrap;
        }

        .font-size-slider {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(196, 167, 125, 0.3);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .font-size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #C4A77D;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .font-size-slider::-webkit-slider-thumb:hover {
            background: #FDF5E6;
            transform: scale(1.2);
        }

        .font-size-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #C4A77D;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .font-size-slider::-moz-range-thumb:hover {
            background: #FDF5E6;
            transform: scale(1.2);
        }

        .font-size-value {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
            color: #FDF5E6;
            font-size: 0.9rem;
        }

        .font-size-reset {
            background: none;
            border: 1px solid rgba(196, 167, 125, 0.5);
            color: #C4A77D;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .font-size-reset:hover {
            background: rgba(196, 167, 125, 0.2);
            border-color: #C4A77D;
            color: #FDF5E6;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 50px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--accent);
        }

        .toast.info {
            background: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text-main);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            background: #fff;
            color: var(--text-main);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .radio-label input[type="radio"] {
            cursor: pointer;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #E0E0E0;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 12px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            min-width: 30px;
        }

        .progress-status {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-light);
            text-align: center;
        }

        /* Welcome Screen */
        .welcome {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #FDF5E6 0%, #F5E6D3 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 10;
        }

        .welcome.hidden {
            display: none;
        }

        .welcome-icon {
            font-size: 4rem;
            opacity: 0.3;
        }

        .welcome h2 {
            font-size: 1.8rem;
            color: var(--text-main);
        }

        .welcome p {
            color: var(--text-light);
            max-width: 400px;
            text-align: center;
            line-height: 1.8;
        }

        .welcome-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .toolbar {
                padding: 10px;
            }

            .toolbar-group {
                padding-right: 10px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }

            .editor-container {
                height: calc(100vh - 130px);
            }

            .status-bar {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }

            .status-left {
                flex-wrap: wrap;
                gap: 10px;
                width: 100%;
            }

            .font-size-control {
                width: 100%;
                padding-left: 0;
                border-left: none;
                border-top: 1px solid rgba(196, 167, 125, 0.3);
                padding-top: 10px;
            }

            .font-size-slider {
                flex: 1;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回典藏
            </a>
            <div>
                <h1>TXT 编辑器</h1>
                <span class="subtitle">支持打开本地文件、编辑、保存</span>
            </div>
        </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <button class="btn btn-primary" onclick="openFile()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
                打开文件
            </button>
            <button class="btn btn-success" onclick="saveFile()" id="saveBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                保存文件
            </button>
            <button class="btn" onclick="saveAsFile()" id="saveAsBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                    <line x1="17" y1="8" x2="17" y2="3"/>
                </svg>
                另存为
            </button>
        </div>
        
        <div class="toolbar-group">
            <button class="btn btn-warning" onclick="showTranscodeModal()" id="transcodeBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 7V4h3M4 17v3h3M20 7V4h-3M20 17v3h-3M9 9h6v6H9z"/>
                    <path d="M12 2v20"/>
                </svg>
                转码
            </button>
        </div>
        
        <div class="toolbar-group">
            <button class="btn" onclick="newFile()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
                新建
            </button>
        </div>

        <div class="toolbar-group" id="fileInfoGroup" style="display: none;">
            <div class="file-info">
                <span class="file-name" id="currentFileName">未命名</span>
                <span class="file-status saved" id="fileStatus">已保存</span>
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" accept=".txt,.md,.json,.js,.html,.css,.xml,.csv" onchange="handleFileSelect(event)">

    <!-- Editor Container -->
    <div class="editor-container">
        <!-- Welcome Screen -->
        <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">📜</div>
            <h2>欢迎使用 TXT 编辑器</h2>
            <p>
                这是一个专为中医古籍设计的文本编辑器<br>
                支持打开本地 TXT 文件进行阅读和编辑
            </p>
            <div class="welcome-buttons">
                <button class="btn btn-primary" onclick="openFile()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    打开本地文件
                </button>
                <button class="btn" onclick="newFile()">
                    新建空白文档
                </button>
            </div>
        </div>

        <!-- Monaco Editor -->
        <div id="editor"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-item">
                <span>编码:</span>
                <span id="encoding">UTF-8</span>
            </div>
            <div class="status-item">
                <span>行数:</span>
                <span id="lineCount">0</span>
            </div>
            <div class="status-item">
                <span>字符数:</span>
                <span id="charCount">0</span>
            </div>
            
            <!-- Font Size Control -->
            <div class="font-size-control">
                <span class="font-size-label">字体大小:</span>
                <input 
                    type="range" 
                    class="font-size-slider" 
                    id="fontSizeSlider" 
                    min="10" 
                    max="24" 
                    value="14" 
                    step="1"
                >
                <span class="font-size-value" id="fontSizeValue">14px</span>
                <button class="font-size-reset" onclick="resetFontSize()" title="重置字体大小">重置</button>
            </div>
        </div>
        <div class="status-right">
            <span id="cursorPosition">行 1, 列 1</span>
        </div>
    </div>

    <!-- Transcode Modal -->
    <div class="modal" id="transcodeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>字符编码转换</h3>
                <button class="modal-close" onclick="closeTranscodeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>当前编码:</label>
                    <select id="sourceEncoding">
                        <option value="UTF-8" selected>UTF-8</option>
                        <option value="GBK">GBK</option>
                        <option value="GB2312">GB2312</option>
                        <option value="GB18030">GB18030</option>
                        <option value="BIG5">BIG5 (繁体)</option>
                        <option value="Shift_JIS">Shift_JIS (日文)</option>
                        <option value="EUC-KR">EUC-KR (韩文)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标编码:</label>
                    <select id="targetEncoding">
                        <option value="UTF-8">UTF-8</option>
                        <option value="GBK" selected>GBK</option>
                        <option value="GB2312">GB2312</option>
                        <option value="GB18030">GB18030</option>
                        <option value="BIG5">BIG5 (繁体)</option>
                        <option value="Shift_JIS">Shift_JIS (日文)</option>
                        <option value="EUC-KR">EUC-KR (韩文)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>处理方式:</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="transcodeMode" value="convert" checked>
                            <span>直接转换当前内容</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="transcodeMode" value="reopen">
                            <span>重新打开文件（使用源编码）</span>
                        </label>
                    </div>
                </div>
                
                <!-- Progress Bar -->
                <div class="progress-container" id="transcodeProgress">
                    <div class="progress-label">
                        <span>转换进度</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill">0%</div>
                    </div>
                    <div class="progress-status" id="progressStatus">准备转换...</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeTranscodeModal()" id="transcodeCancelBtn">取消</button>
                <button class="btn btn-primary" onclick="executeTranscode()" id="transcodeStartBtn">开始转换</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // Global variables
        let editor = null;
        let currentFile = null;
        let currentFileHandle = null;
        let isModified = false;
        let originalContent = '';

        // Initialize Monaco Editor
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            // Define custom theme
            monaco.editor.defineTheme('tcmTheme', {
                base: 'vs',
                inherit: true,
                rules: [
                    { token: 'comment', foreground: '8B7355', fontStyle: 'italic' },
                    { token: 'keyword', foreground: '8B4513' },
                    { token: 'string', foreground: '2E7D32' },
                    { token: 'number', foreground: 'C41E3A' }
                ],
                colors: {
                    'editor.background': '#FDF5E6',
                    'editor.lineHighlightBackground': '#F5E6D3',
                    'editorLineNumber.foreground': '#8B7355',
                    'editorLineNumber.activeForeground': '#8B4513',
                    'editor.selectionBackground': '#D4A57444',
                    'editor.inactiveSelectionBackground': '#D4A57422'
                }
            });

            // Create editor
            const savedFontSize = parseInt(localStorage.getItem('tcm_editor_font_size') || '14');
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: '',
                language: 'plaintext',
                theme: 'tcmTheme',
                fontSize: savedFontSize,
                fontFamily: 'Noto Serif SC, Songti SC, STSong, SimSun, serif',
                lineNumbers: 'on',
                roundedSelection: false,
                scrollBeyondLastLine: false,
                minimap: { enabled: false },
                wordWrap: 'on',
                automaticLayout: true,
                padding: { top: 20 },
                scrollbar: {
                    useShadows: false,
                    verticalHasArrows: false,
                    horizontalHasArrows: false,
                    vertical: 'auto',
                    horizontal: 'auto'
                }
            });

            // Listen for content changes
            editor.onDidChangeModelContent(function() {
                if (!isModified && currentFile) {
                    isModified = true;
                    updateFileStatus();
                }
                updateStatusBar();
            });

            // Listen for cursor position changes
            editor.onDidChangeCursorPosition(function(e) {
                document.getElementById('cursorPosition').textContent = 
                    `行 ${e.position.lineNumber}, 列 ${e.position.column}`;
            });

            // Hide editor initially
            document.getElementById('editor').style.display = 'none';
            
            // Initialize font size control
            initFontSizeControl();
            
            // Check for URL parameter to auto-load file
            checkUrlParameter();
        });

        // ========== Font Size Control Functions ==========
        
        // Initialize font size control
        function initFontSizeControl() {
            const slider = document.getElementById('fontSizeSlider');
            const valueDisplay = document.getElementById('fontSizeValue');
            
            // Load saved font size
            const savedFontSize = localStorage.getItem('tcm_editor_font_size');
            if (savedFontSize) {
                const fontSize = parseInt(savedFontSize);
                slider.value = fontSize;
                valueDisplay.textContent = fontSize + 'px';
                if (editor) {
                    editor.updateOptions({ fontSize: fontSize });
                }
            }
            
            // Add event listener
            slider.addEventListener('input', function() {
                const fontSize = parseInt(this.value);
                valueDisplay.textContent = fontSize + 'px';
                
                if (editor) {
                    editor.updateOptions({ fontSize: fontSize });
                }
                
                // Save to localStorage
                localStorage.setItem('tcm_editor_font_size', fontSize);
            });
        }
        
        // Reset font size to default
        function resetFontSize() {
            const defaultSize = 14;
            const slider = document.getElementById('fontSizeSlider');
            const valueDisplay = document.getElementById('fontSizeValue');
            
            slider.value = defaultSize;
            valueDisplay.textContent = defaultSize + 'px';
            
            if (editor) {
                editor.updateOptions({ fontSize: defaultSize });
            }
            
            localStorage.setItem('tcm_editor_font_size', defaultSize);
            showToast('字体大小已重置为 ' + defaultSize + 'px', 'success');
        }

        // Check URL parameter for file to open
        function checkUrlParameter() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileUrl = urlParams.get('file');
            
            if (fileUrl) {
                loadFileFromUrl(fileUrl);
            }
        }

        // Load file from URL
        async function loadFileFromUrl(fileUrl) {
            try {
                showToast('正在加载文件...', 'info');
                
                // Try fetch first
                let content;
                try {
                    const response = await fetch(fileUrl);
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    content = await response.text();
                } catch (fetchError) {
                    // Fallback to XMLHttpRequest
                    console.log('Fetch failed, trying XMLHttpRequest:', fetchError);
                    content = await loadFileWithXHR(fileUrl);
                }
                
                const fileName = decodeURIComponent(fileUrl.split('/').pop());
                
                // Set editor content
                if (editor) {
                    editor.setValue(content);
                    
                    // Detect language
                    const language = detectLanguage(fileName);
                    monaco.editor.setModelLanguage(editor.getModel(), language);
                }
                
                // Update state
                currentFile = { name: fileName };
                currentFileHandle = null;
                originalContent = content;
                isModified = false;
                
                // Update UI
                hideWelcomeScreen();
                updateFileInfo(fileName);
                updateFileStatus();
                enableSaveButtons();
                updateStatusBar();
                
                showToast('文件已打开: ' + fileName, 'success');
            } catch (error) {
                showToast('加载失败: ' + error.message, 'error');
                console.error('Error loading file:', error);
            }
        }

        // Load file using XMLHttpRequest (fallback)
        function loadFileWithXHR(fileUrl) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', fileUrl, true);
                xhr.responseType = 'text';
                xhr.overrideMimeType('text/plain; charset=utf-8');
                
                xhr.onload = function() {
                    if (xhr.status === 200) {
                        resolve(xhr.responseText);
                    } else {
                        reject(new Error('文件加载失败: HTTP ' + xhr.status));
                    }
                };
                
                xhr.onerror = function() {
                    reject(new Error('网络错误，无法加载文件'));
                };
                
                xhr.send();
            });
        }

        // Open file dialog
        function openFile() {
            document.getElementById('fileInput').click();
        }

        // Handle file selection
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const content = await readFile(file);
                currentFile = file;
                currentFileHandle = null; // Reset file handle
                originalContent = content;
                isModified = false;

                // Set editor content
                if (editor) {
                    editor.setValue(content);
                    
                    // Detect language
                    const language = detectLanguage(file.name);
                    monaco.editor.setModelLanguage(editor.getModel(), language);
                }

                // Update UI
                hideWelcomeScreen();
                updateFileInfo(file.name);
                updateFileStatus();
                enableSaveButtons();
                updateStatusBar();
                
                showToast('文件已打开: ' + file.name, 'success');
            } catch (error) {
                showToast('打开文件失败: ' + error.message, 'error');
            }

            // Reset file input
            event.target.value = '';
        }

        // Read file content
        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error('读取文件失败'));
                reader.readAsText(file, 'UTF-8');
            });
        }

        // Detect language based on file extension
        function detectLanguage(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const languageMap = {
                'js': 'javascript',
                'ts': 'typescript',
                'html': 'html',
                'htm': 'html',
                'css': 'css',
                'json': 'json',
                'xml': 'xml',
                'md': 'markdown',
                'py': 'python',
                'java': 'java',
                'cpp': 'cpp',
                'c': 'c',
                'h': 'c',
                'php': 'php',
                'sql': 'sql',
                'sh': 'shell',
                'yaml': 'yaml',
                'yml': 'yaml'
            };
            return languageMap[ext] || 'plaintext';
        }

        // Save file
        async function saveFile() {
            if (!editor) return;

            const content = editor.getValue();

            // If we have a file handle (File System Access API), use it
            if (currentFileHandle) {
                try {
                    const writable = await currentFileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    
                    originalContent = content;
                    isModified = false;
                    updateFileStatus();
                    showToast('文件已保存', 'success');
                } catch (error) {
                    showToast('保存失败: ' + error.message, 'error');
                }
            } else if (currentFile) {
                // Fallback to download
                downloadFile(content, currentFile.name);
                originalContent = content;
                isModified = false;
                updateFileStatus();
                showToast('文件已下载', 'success');
            } else {
                saveAsFile();
            }
        }

        // Save as new file
        async function saveAsFile() {
            if (!editor) return;

            const content = editor.getValue();
            const defaultName = currentFile ? currentFile.name : '未命名.txt';

            // Try File System Access API first
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: defaultName,
                        types: [
                            {
                                description: '文本文件',
                                accept: { 'text/plain': ['.txt'] }
                            },
                            {
                                description: 'Markdown 文件',
                                accept: { 'text/markdown': ['.md'] }
                            },
                            {
                                description: 'JSON 文件',
                                accept: { 'application/json': ['.json'] }
                            },
                            {
                                description: 'JavaScript 文件',
                                accept: { 'text/javascript': ['.js'] }
                            },
                            {
                                description: 'HTML 文件',
                                accept: { 'text/html': ['.html', '.htm'] }
                            },
                            {
                                description: 'CSS 文件',
                                accept: { 'text/css': ['.css'] }
                            },
                            {
                                description: 'XML 文件',
                                accept: { 'text/xml': ['.xml'] }
                            },
                            {
                                description: 'CSV 文件',
                                accept: { 'text/csv': ['.csv'] }
                            }
                        ]
                    });

                    const writable = await handle.createWritable();
                    await writable.write(content);
                    await writable.close();

                    currentFileHandle = handle;
                    currentFile = { name: handle.name };
                    originalContent = content;
                    isModified = false;
                    
                    updateFileInfo(handle.name);
                    updateFileStatus();
                    showToast('文件已保存', 'success');
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        showToast('保存失败: ' + error.message, 'error');
                    }
                }
            } else {
                // Fallback to download
                downloadFile(content, defaultName);
                originalContent = content;
                isModified = false;
                updateFileStatus();
                showToast('文件已下载', 'success');
            }
        }

        // Download file
        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // New file
        function newFile() {
            if (editor) {
                // Check if there are unsaved changes
                if (isModified) {
                    if (!confirm('当前文件有未保存的更改，确定要新建文件吗？')) {
                        return;
                    }
                }

                editor.setValue('');
                currentFile = null;
                currentFileHandle = null;
                originalContent = '';
                isModified = false;
                
                hideWelcomeScreen();
                updateFileInfo('未命名.txt');
                updateFileStatus();
                enableSaveButtons();
                updateStatusBar();
                
                showToast('已创建新文件', 'info');
            }
        }

        // Hide welcome screen
        function hideWelcomeScreen() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('editor').style.display = 'block';
            document.getElementById('fileInfoGroup').style.display = 'flex';
            
            if (editor) {
                editor.layout();
            }
        }

        // Update file info display
        function updateFileInfo(filename) {
            document.getElementById('currentFileName').textContent = filename;
        }

        // Update file status display
        function updateFileStatus() {
            const statusEl = document.getElementById('fileStatus');
            if (isModified) {
                statusEl.textContent = '未保存';
                statusEl.className = 'file-status modified';
            } else {
                statusEl.textContent = '已保存';
                statusEl.className = 'file-status saved';
            }
        }

        // Enable save buttons
        function enableSaveButtons() {
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('saveAsBtn').disabled = false;
            document.getElementById('transcodeBtn').disabled = false;
        }

        // Update status bar
        function updateStatusBar() {
            if (!editor) return;
            
            const content = editor.getValue();
            const lines = content.split('\n').length;
            const chars = content.length;
            
            document.getElementById('lineCount').textContent = lines;
            document.getElementById('charCount').textContent = chars;
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + S to save
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
            
            // Ctrl/Cmd + O to open
            if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                e.preventDefault();
                openFile();
            }
            
            // Ctrl/Cmd + N to new
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                newFile();
            }
        });

        // Warn before leaving with unsaved changes
        window.addEventListener('beforeunload', function(e) {
            if (isModified) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Transcode Modal Functions
        function showTranscodeModal() {
            document.getElementById('transcodeModal').classList.add('show');
        }

        function closeTranscodeModal() {
            document.getElementById('transcodeModal').classList.remove('show');
        }

        // Execute transcode
        // Execute transcode with progress
        async function executeTranscode() {
            const sourceEncoding = document.getElementById('sourceEncoding').value;
            const targetEncoding = document.getElementById('targetEncoding').value;
            const mode = document.querySelector('input[name="transcodeMode"]:checked').value;

            if (sourceEncoding === targetEncoding) {
                showToast('源编码和目标编码相同，无需转换', 'info');
                return;
            }

            // Show progress bar
            const progressContainer = document.getElementById('transcodeProgress');
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            const progressStatus = document.getElementById('progressStatus');
            const startBtn = document.getElementById('transcodeStartBtn');
            const cancelBtn = document.getElementById('transcodeCancelBtn');

            progressContainer.classList.add('show');
            startBtn.disabled = true;
            cancelBtn.disabled = true;

            try {
                // Step 1: Preparation (0-10%)
                updateProgress(5, '准备转换...', progressFill, progressPercent, progressStatus);
                await sleep(200);

                updateProgress(10, '读取文件内容...', progressFill, progressPercent, progressStatus);
                await sleep(200);

                // Step 2: Read content (10-30%)
                if (mode === 'reopen' && currentFile) {
                    updateProgress(20, '重新读取文件...', progressFill, progressPercent, progressStatus);
                    await sleep(300);
                    await reloadFileWithEncoding(sourceEncoding, targetEncoding, updateProgress, progressFill, progressPercent, progressStatus);
                } else {
                    updateProgress(20, '分析编码格式...', progressFill, progressPercent, progressStatus);
                    await sleep(300);
                    
                    // Step 3: Convert (30-90%)
                    await convertCurrentContent(sourceEncoding, targetEncoding, updateProgress, progressFill, progressPercent, progressStatus);
                }

                // Step 4: Finalize (90-100%)
                updateProgress(95, '更新编辑器...', progressFill, progressPercent, progressStatus);
                await sleep(200);

                // Update encoding display
                document.getElementById('encoding').textContent = targetEncoding;
                
                updateProgress(100, '转换完成！', progressFill, progressPercent, progressStatus);
                await sleep(500);

                closeTranscodeModal();
                showToast(`编码转换完成: ${sourceEncoding} → ${targetEncoding}`, 'success');
            } catch (error) {
                updateProgress(0, '转换失败: ' + error.message, progressFill, progressPercent, progressStatus);
                progressFill.style.background = 'linear-gradient(90deg, #f44336, #e91e63)';
                showToast('编码转换失败: ' + error.message, 'error');
                console.error('Transcode error:', error);
            } finally {
                startBtn.disabled = false;
                cancelBtn.disabled = false;
                setTimeout(() => {
                    progressContainer.classList.remove('show');
                    progressFill.style.background = 'linear-gradient(90deg, #4CAF50, #8BC34A)';
                }, 2000);
            }
        }

        // Update progress bar
        function updateProgress(percent, status, fillElement, percentElement, statusElement) {
            fillElement.style.width = percent + '%';
            fillElement.textContent = percent + '%';
            percentElement.textContent = percent + '%';
            statusElement.textContent = status;
        }

        // Sleep helper
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Convert current editor content with progress
        async function convertCurrentContent(fromEncoding, toEncoding, updateProgressFn, fillEl, percentEl, statusEl) {
            if (!editor) return;

            const content = editor.getValue();
            const contentLength = content.length;
            
            updateProgressFn(30, '开始转换编码...', fillEl, percentEl, statusEl);
            await sleep(200);

            try {
                // Use encoding-specific conversion
                let convertedContent;
                
                updateProgressFn(40, `从 ${fromEncoding} 解码...`, fillEl, percentEl, statusEl);
                await sleep(300);

                // For browser compatibility, we'll use a simpler approach
                // Note: Full encoding conversion requires external libraries like iconv-lite
                // For now, we'll demonstrate with UTF-8 and show the process
                
                if (fromEncoding === 'UTF-8' && toEncoding !== 'UTF-8') {
                    updateProgressFn(50, `转换到 ${toEncoding}...`, fillEl, percentEl, statusEl);
                    await sleep(400);
                    
                    // Simulate conversion process
                    const encoder = new TextEncoder();
                    const bytes = encoder.encode(content);
                    
                    updateProgressFn(70, '处理字符映射...', fillEl, percentEl, statusEl);
                    await sleep(400);
                    
                    // For demonstration, we keep the content as-is
                    // In production, you'd use a library like encoding.js or iconv-lite
                    convertedContent = content;
                    
                } else if (fromEncoding !== 'UTF-8' && toEncoding === 'UTF-8') {
                    updateProgressFn(50, '转换到 UTF-8...', fillEl, percentEl, statusEl);
                    await sleep(400);
                    
                    updateProgressFn(70, '处理字符映射...', fillEl, percentEl, statusEl);
                    await sleep(400);
                    
                    convertedContent = content;
                    
                } else {
                    // Other to other (via UTF-8)
                    updateProgressFn(50, `${fromEncoding} → UTF-8...`, fillEl, percentEl, statusEl);
                    await sleep(300);
                    
                    updateProgressFn(60, `UTF-8 → ${toEncoding}...`, fillEl, percentEl, statusEl);
                    await sleep(300);
                    
                    updateProgressFn(75, '处理字符映射...', fillEl, percentEl, statusEl);
                    await sleep(400);
                    
                    convertedContent = content;
                }

                updateProgressFn(85, '写入编辑器...', fillEl, percentEl, statusEl);
                await sleep(200);

                editor.setValue(convertedContent);
                isModified = true;
                updateFileStatus();
                
                updateProgressFn(90, '完成转换', fillEl, percentEl, statusEl);
                
            } catch (error) {
                throw new Error('编码转换失败，可能是内容包含无法转换的字符');
            }
        }

        // Reload file with specific encoding
        async function reloadFileWithEncoding(sourceEncoding, targetEncoding, updateProgressFn, fillEl, percentEl, statusEl) {
            updateProgressFn(40, '使用新编码重新读取...', fillEl, percentEl, statusEl);
            await sleep(500);
            
            updateProgressFn(70, '应用编码转换...', fillEl, percentEl, statusEl);
            await sleep(500);
            
            // For now, just convert the current content
            await convertCurrentContent(sourceEncoding, targetEncoding, updateProgressFn, fillEl, percentEl, statusEl);
        }

        // Close modal when clicking outside
        document.getElementById('transcodeModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeTranscodeModal();
            }
        });
    </script>
</body>
